        const DEFAULT_THESIS = { currentWords: 0, targetWords: 30000, startDate: "", targetDate: "" };
        const bookColors = ["red", "blue", "ice", "success"];

        // ── 工具函数 ───────────────────────────────────────────────────────
        const uid = () => Math.random().toString(36).slice(2, 10);
        const calcChapterProgress = (ch) => {
          if (!ch.sections.length) return 0;
          return Math.round(ch.sections.reduce((s, sec) => s + sec.progress, 0) / ch.sections.length);
        };
        const calcBookProgress = (book) => {
          const allSections = book.chapters.flatMap((c) => c.sections);
          if (!allSections.length) return 0;
          return Math.round(allSections.reduce((s, sec) => s + sec.progress, 0) / allSections.length);
        };
        const calcTotalProgress = (books) => {
          const allSections = books.flatMap((b) => b.chapters.flatMap((c) => c.sections));
          if (!allSections.length) return 0;
          return Math.round(allSections.reduce((s, sec) => s + sec.progress, 0) / allSections.length);
        };
        const daysBetween = (a, b) => {
          const d1 = new Date(a), d2 = new Date(b);
          return Math.ceil((d2 - d1) / (1000 * 60 * 60 * 24));
        };
        const today = new Date().toISOString().slice(0, 10);

        // ── 组件定义 ──────────────────────────────────────────────────────

        function ProgressBar({ pct, color, height }) {
          return (
            <div className="progress-bar" style={height ? { height } : {}}>
              <div
                className={`progress-fill ${color}`}
                style={{ width: `${Math.min(100, Math.max(0, pct))}%` }}
              />
            </div>
          );
        }

        function SectionRow({ section, onChange, isAutoFilled }) {
          return (
            <div className={`section-row ${isAutoFilled ? "auto-filled" : ""}`}>
              <span className="section-name" title={section.name}>{section.name}</span>
              <div className="slider-wrap">
                <input
                  type="range"
                  min="0"
                  max="100"
                  step="5"
                  value={section.progress}
                  onChange={(e) => onChange(section.id, Number(e.target.value))}
                />
                <span className="slider-val">{section.progress}%</span>
              </div>
            </div>
          );
        }

        function ChapterBlock({ chapter, onSectionChange, autoFilledIds }) {
          const [open, setOpen] = useState(false);
          const pct = calcChapterProgress(chapter);
          return (
            <div className="chapter">
              <div className="chapter-head" onClick={() => setOpen(!open)}>
                <span className="chapter-name">
                  <span className={`arrow ${open ? "open" : ""}`}>▶</span>{" "}
                  {chapter.name}
                </span>
                <span className="chapter-pct">{pct}%</span>
              </div>
              {open && (
                <div className="sections">
                  {chapter.sections.map((sec) => (
                    <SectionRow
                      key={sec.id}
                      section={sec}
                      onChange={onSectionChange}
                      isAutoFilled={autoFilledIds.has(sec.id)}
                    />
                  ))}
                </div>
              )}
              <ProgressBar pct={pct} color="blue" />
            </div>
          );
        }

        function BookPanel({ book, colorIdx, onSectionChange, onDateChange }) {
          const [open, setOpen] = useState(false);
          const pct = calcBookProgress(book);
          const color = bookColors[colorIdx % bookColors.length];

          const allSections = book.chapters.flatMap((c) => c.sections);
          const autoFilledIds = useMemo(() => {
            const ids = new Set();
            let lastActiveIdx = -1;
            for (let i = allSections.length - 1; i >= 0; i--) {
              if (allSections[i].progress > 0) {
                lastActiveIdx = i;
                break;
              }
            }
            for (let i = 0; i < lastActiveIdx; i++) {
              if (allSections[i].progress === 100) ids.add(allSections[i].id);
            }
            return ids;
          }, [allSections]);

          const remainingSections = allSections.reduce((s, sec) => s + (100 - sec.progress) / 100, 0);
          const daysLeft = book.targetDate ? daysBetween(today, book.targetDate) : null;
          const dailySections = daysLeft && daysLeft > 0 ? (remainingSections / daysLeft).toFixed(1) : null;

          return (
            <div className="book-panel">
              <div className="book-header" onClick={() => setOpen(!open)}>
                <span className="book-title">{book.name}</span>
                <div className="book-meta">
                  <span className="book-pct" style={{ color: `var(--${color === "ice" ? "ice" : color === "success" ? "success" : color === "red" ? "red" : "blue-bright"})` }}>
                    {pct}%
                  </span>
                  <span className={`arrow ${open ? "open" : ""}`}>▶</span>
                </div>
              </div>
              {open && (
                <div className="book-body">
                  <div className="auto-fill-hint">
                    <span className="auto-fill-dot" />
                    链表模式：拖动进度时，前面的小节自动填满
                  </div>
                  {book.chapters.map((ch) => (
                    <ChapterBlock
                      key={ch.id}
                      chapter={ch}
                      onSectionChange={onSectionChange}
                      autoFilledIds={autoFilledIds}
                    />
                  ))}
                </div>
              )}
              <div className="schedule-bar">
                <span className="date-label">开始</span>
                <input
                  type="date"
                  className="date-input"
                  value={book.startDate || ""}
                  onChange={(e) => onDateChange(book.id, "startDate", e.target.value)}
                  onClick={(e) => e.stopPropagation()}
                />
                <span className="date-label">目标</span>
                <input
                  type="date"
                  className="date-input"
                  value={book.targetDate || ""}
                  onChange={(e) => onDateChange(book.id, "targetDate", e.target.value)}
                  onClick={(e) => e.stopPropagation()}
                />
                {daysLeft !== null && (
                  <span className={`daily-hint ${daysLeft <= 0 ? "warn" : dailySections > 2 ? "warn" : "ok"}`}>
                    {daysLeft <= 0 ? "已超期！" : `剩${daysLeft}天，约${dailySections}节/天`}
                  </span>
                )}
              </div>
              <div style={{ padding: "0 18px 12px" }}>
                <ProgressBar pct={pct} color={color} />
              </div>
            </div>
          );
        }

        function EditPanel({ books, setBooks }) {
          const [editingBook, setEditingBook] = useState(null);
          const updateBookName = (id, name) => setBooks(b => b.map(x => x.id === id ? {...x, name} : x));
          const addChapter = (id) => setBooks(b => b.map(x => x.id === id ? {...x, chapters: [...x.chapters, {id: uid(), name:"新章节", sections:[]}]} : x));
          const deleteBook = (id) => setBooks(b => b.filter(x => x.id !== id));

          return (
            <div>
              {books.map(book => (
                <div key={book.id} className="book-panel" style={{padding: 16}}>
                  <input className="edit-input" value={book.name} onChange={e => updateBookName(book.id, e.target.value)} style={{width:'100%', marginBottom:8}}/>
                  <button className="btn btn-sm" onClick={() => setEditingBook(editingBook === book.id ? null : book.id)}>编辑详情</button>
                  <button className="btn btn-sm btn-red" onClick={() => deleteBook(book.id)} style={{marginLeft:8}}>删除</button>
                  {editingBook === book.id && <div style={{marginTop:10, color:'var(--text-dim)'}}>章节编辑功能已在单文件版中简化，建议通过导出JSON修改后重新导入。</div>}
                </div>
              ))}
              <button className="btn" onClick={() => setBooks([...books, {id: uid(), name:"新教材", chapters:[], startDate:"", targetDate:""}])}>+ 添加教材</button>
            </div>
          );
        }

        // ── 主应用 ────────────────────────────────────────────────────────
        function ProgressTracker() {
          // 初始化时尝试从 localStorage 读取
          const [books, setBooks] = useState(() => {
            const saved = localStorage.getItem('408_books');
            return saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(DEFAULT_BOOKS));
          });
          const [thesis, setThesis] = useState(() => {
            const saved = localStorage.getItem('408_thesis');
            return saved ? JSON.parse(saved) : { ...DEFAULT_THESIS };
          });
          
          const [tab, setTab] = useState("overview");
          const [showResetModal, setShowResetModal] = useState(false);
          const fileInputRef = useRef(null);

          // 自动保存数据
          useEffect(() => {
            localStorage.setItem('408_books', JSON.stringify(books));
            localStorage.setItem('408_thesis', JSON.stringify(thesis));
          }, [books, thesis]);

          const handleSectionChange = useCallback((sectionId, value) => {
            setBooks(prev => prev.map(book => {
              const allSections = book.chapters.flatMap(c => c.sections);
              const targetIndex = allSections.findIndex(s => s.id === sectionId);
              if (targetIndex === -1) return book;
              const autoFillIds = new Set(allSections.slice(0, targetIndex).map(s => s.id));
              return {
                ...book,
                chapters: book.chapters.map(ch => ({
                  ...ch,
                  sections: ch.sections.map(sec => {
                    if (sec.id === sectionId) return { ...sec, progress: value };
                    if (value > 0 && autoFillIds.has(sec.id)) return { ...sec, progress: 100 };
                    return sec;
                  })
                }))
              };
            }));
          }, []);

          const totalPct = useMemo(() => calcTotalProgress(books), [books]);
          const thesisPct = thesis.targetWords > 0 ? Math.min(100, Math.round((thesis.currentWords / thesis.targetWords) * 100)) : 0;

          return (
            <div className="app">
              <div className="header">
                <h1>408 · 进度追踪</h1>
                <div className="header-sub">数据结构 · 组成原理 · 操作系统 · 计算机网络</div>
              </div>

              <div className="toolbar">
                <button className="btn" onClick={() => {
                   const data = { books, thesis };
                   const blob = new Blob([JSON.stringify(data)], {type: 'application/json'});
                   const a = document.createElement('a');
                   a.href = URL.createObjectURL(blob);
                   a.download = '408-progress.json';
                   a.click();
                }}>导出</button>
                <button className="btn btn-red" onClick={() => setShowResetModal(true)}>重置</button>
              </div>

              <div className="overview">
                <div className="overview-card total-card">
                  <div className="oc-label">总进度</div>
                  <div className="oc-value red">{totalPct}%</div>
                </div>
                {books.map((b, i) => (
                  <div className="overview-card" key={b.id}>
                    <div className="oc-label">{b.name}</div>
                    <div className={`oc-value ${bookColors[i%4]}`}>{calcBookProgress(b)}%</div>
                  </div>
                ))}
              </div>

              <div className="tabs">
                <button className={`tab ${tab === "overview" ? "active" : ""}`} onClick={() => setTab("overview")}>学习</button>
                <button className={`tab ${tab === "thesis" ? "active" : ""}`} onClick={() => setTab("thesis")}>论文</button>
                <button className={`tab ${tab === "edit" ? "active" : ""}`} onClick={() => setTab("edit")}>管理</button>
              </div>

              {tab === "overview" && books.map((b, i) => (
                <BookPanel key={b.id} book={b} colorIdx={i} onSectionChange={handleSectionChange} onDateChange={(id, f, v) => setBooks(bs => bs.map(x => x.id === id ? {...x, [f]: v} : x))}/>
              ))}

              {tab === "thesis" && (
                <div className="thesis-panel">
                  <div className="thesis-inputs">
                    <div className="thesis-field">
                      <label>当前/目标字数</label>
                      <input type="number" value={thesis.currentWords} onChange={e => setThesis({...thesis, currentWords: +e.target.value})}/>
                      <input type="number" value={thesis.targetWords} onChange={e => setThesis({...thesis, targetWords: +e.target.value})} style={{marginLeft:8}}/>
                    </div>
                  </div>
                  <div className="thesis-big-pct">{thesisPct}%</div>
                  <ProgressBar pct={thesisPct} color="success" height="12px" />
                </div>
              )}

              {tab === "edit" && <EditPanel books={books} setBooks={setBooks} />}

              {showResetModal && (
                <div className="modal-overlay">
                  <div className="modal">
                    <h3>确定重置？</h3>
                    <div className="modal-actions">
                      <button className="btn" onClick={() => setShowResetModal(false)}>取消</button>
                      <button className="btn btn-red" onClick={() => { localStorage.clear(); location.reload(); }}>确定</button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ProgressTracker />);
    </script>

    <style>
        /* 这里粘贴你原有的全部 CSS 样式 */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap');
        :root {
            --navy: #0a1628; --navy-light: #111d33; --navy-mid: #162440; --navy-surface: #1a2d4a;
            --red: #e63946; --blue: #457b9d; --blue-bright: #5da4d6; --ice: #a8dadc;
            --text: #e8edf4; --text-dim: #8899b0; --text-muted: #4a5e78; --success: #2a9d8f;
        }
        body { font-family: 'Noto Sans SC', sans-serif; background: var(--navy); color: var(--text); margin: 0; }
        .app { max-width: 800px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { background: linear-gradient(135deg, var(--red), var(--blue-bright)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .overview { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .overview-card { background: var(--navy-light); padding: 15px; border-radius: 8px; text-align: center; border: 1px solid var(--navy-mid); }
        .oc-value { font-family: 'JetBrains Mono'; font-size: 24px; font-weight: bold; }
        .oc-value.red { color: var(--red); }
        .oc-value.blue { color: var(--blue-bright); }
        .oc-value.ice { color: var(--ice); }
        .oc-value.success { color: var(--success); }
        .progress-bar { height: 6px; background: var(--navy-mid); border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; transition: width 0.3s; }
        .progress-fill.red { background: var(--red); }
        .progress-fill.blue { background: var(--blue-bright); }
        .progress-fill.success { background: var(--success); }
        .tabs { display: flex; border-bottom: 1px solid var(--navy-mid); margin-bottom: 20px; }
        .tab { padding: 10px 20px; background: none; border: none; color: var(--text-dim); cursor: pointer; }
        .tab.active { color: var(--red); border-bottom: 2px solid var(--red); }
        .book-panel { background: var(--navy-light); border: 1px solid var(--navy-mid); border-radius: 8px; margin-bottom: 15px; padding: 10px; }
        .book-header { display: flex; justify-content: space-between; cursor: pointer; padding: 10px; }
        .section-row { display: flex; align-items: center; justify-content: space-between; padding: 5px 10px; font-size: 13px; }
        .slider-wrap { display: flex; align-items: center; gap: 10px; }
        .btn { padding: 5px 15px; border-radius: 4px; border: 1px solid var(--navy-mid); background: var(--navy-surface); color: white; cursor: pointer; }
        .btn-red { border-color: var(--red); color: var(--red); }
        .toolbar { display: flex; gap: 10px; justify-content: flex-end; margin-bottom: 15px; }
        .date-input { background: var(--navy); color: white; border: 1px solid var(--navy-mid); font-size: 12px; }
        .chapter-head { display: flex; justify-content: space-between; padding: 5px 10px; color: var(--text-dim); cursor: pointer; }
        .auto-fill-hint { font-size: 11px; color: var(--success); padding: 5px 10px; opacity: 0.8; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; }
        .modal { background: var(--navy-light); padding: 30px; border-radius: 12px; }
        input[type="number"] { background: var(--navy); color: white; border: 1px solid var(--navy-mid); padding: 5px; border-radius: 4px; }
    </style>
</body>
</html>
