function isLightColor(hex) { const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16); return (r*299+g*587+b*114)/1000>160; }
function formatTime(ts) { const d=new Date(ts),pad=n=>String(n).padStart(2,"0"); return `${d.getMonth()+1}/${d.getDate()} ${pad(d.getHours())}:${pad(d.getMinutes())}`; }
function loadJSON(key) { try { const v=localStorage.getItem(key); return v?JSON.parse(v):null; } catch{return null;} }
function saveJSON(key,val) { try{localStorage.setItem(key,JSON.stringify(val));}catch(e){console.error("Save failed",e);} }

function tcGetThreshold(tc,cid) { for(const g of tc.special){if(g.ids.includes(cid)) return g.threshold;} return tc.normal.threshold; }
function tcGetMinPack(tc,cid) { for(const g of tc.special){if(g.ids.includes(cid)) return g.minPack;} return tc.normal.minPack; }
// Merge display groups: combine special groups with identical threshold+minPack
function tcMergedDisplay(tc) {
  const map=new Map();
  tc.special.forEach(g=>{
    const key=`${g.threshold}-${g.minPack}`;
    if(!map.has(key)) map.set(key,{threshold:g.threshold,minPack:g.minPack,ids:[]});
    map.get(key).ids.push(...g.ids);
  });
  return Array.from(map.values());
}
// Normalize: remove special groups identical to normal, dedupe ids (last wins)
function tcNormalize(tc) {
  const idMap=new Map();
  tc.special.forEach((g,gi)=>g.ids.forEach(id=>idMap.set(id,gi)));
  let rebuilt=tc.special.map((g,gi)=>({...g,ids:g.ids.filter(id=>idMap.get(id)===gi)}));
  rebuilt=rebuilt.filter(g=>!(g.threshold===tc.normal.threshold&&g.minPack===tc.normal.minPack));
  rebuilt=rebuilt.filter(g=>g.ids.length>0);
  // Merge groups with identical threshold+minPack
  const mergeMap=new Map();
  rebuilt.forEach(g=>{
    const key=`${g.threshold}-${g.minPack}`;
    if(mergeMap.has(key)) mergeMap.get(key).ids.push(...g.ids);
    else mergeMap.set(key,{threshold:g.threshold,minPack:g.minPack,ids:[...g.ids]});
  });
  rebuilt=Array.from(mergeMap.values());
  return {...tc,special:rebuilt};
}

function parseTextInput(text) {
  const items=[],errors=[];
  text.split("\n").forEach((line,i) => {
    const t=line.trim(); if(!t) return;
    const parts=t.split(/\s+/);
    if(parts.length<2){errors.push(`第${i+1}行格式错误: "${t}"`);return;}
    const colorId=parts[0].toUpperCase(),qty=parseInt(parts[1],10);
    if(!COLOR_MAP[colorId]){errors.push(`第${i+1}行色号不存在: ${colorId}`);return;}
    if(isNaN(qty)||qty<=0){errors.push(`第${i+1}行数量无效: ${parts[1]}`);return;}
    items.push({colorId,qty});
  });
  return {items,errors};
}

function App() {
  const [inventory,setInventory]=useState(()=>loadJSON("perler-inventory")||{});
  const [history,setHistory]=useState(()=>loadJSON("perler-history")||[]);
  const [activeGroup,setActiveGroup]=useState("A");
  const [view,setView]=useState("inventory");
  const [searchTerm,setSearchTerm]=useState("");
  const fileInputRef=useRef(null);
  const [toast,setToast]=useState(null);
  const [consumeText,setConsumeText]=useState("");
  const [consumeError,setConsumeError]=useState(null);
  const [restockText,setRestockText]=useState("");
  const [restockError,setRestockError]=useState(null);
  const [projectText,setProjectText]=useState("");
  const [tc,setTc]=useState(()=>loadJSON("perler-threshold")||DEFAULT_TC);
  const [showSettings,setShowSettings]=useState(false);
  const [editNormal,setEditNormal]=useState(null); // {threshold,minPack}
  const [editSpecial,setEditSpecial]=useState(null); // [{ids:"",threshold,minPack}]

  const getThreshold=(cid)=>tcGetThreshold(tc,cid);
  const getMinPack=(cid)=>tcGetMinPack(tc,cid);

  const saveData=useCallback((inv,hist)=>{saveJSON("perler-inventory",inv);saveJSON("perler-history",hist);},[]);
  const saveTc=(newTc)=>{const n=tcNormalize(newTc);setTc(n);saveJSON("perler-threshold",n);};
  const showToast=(msg,type="success")=>{setToast({msg,type});setTimeout(()=>setToast(null),2500);};
  const copyToClipboard=(text)=>{navigator.clipboard.writeText(text).then(()=>showToast("已复制")).catch(()=>showToast("复制失败","error"));};

  const submitConsume=()=>{
    const {items,errors}=parseTextInput(consumeText);
    if(errors.length>0){setConsumeError(errors.join("\n"));return;}
    if(items.length===0){setConsumeError("请输入至少一行");return;}
    const merged={};
    items.forEach(it=>{merged[it.colorId]=(merged[it.colorId]||0)+it.qty;});
    const mergedItems=Object.entries(merged).map(([colorId,qty])=>({colorId,qty}));
    const shortage=mergedItems.filter(r=>(inventory[r.colorId]||0)<r.qty);
    if(shortage.length>0){
      setConsumeError(`库存不足:\n${shortage.map(r=>`${r.colorId} 缺少 ${r.qty-(inventory[r.colorId]||0)} 颗 (库存${inventory[r.colorId]||0}/需要${r.qty})`).join("\n")}`);return;
    }
    const newInv={...inventory};
    mergedItems.forEach(r=>{newInv[r.colorId]=(newInv[r.colorId]||0)-r.qty;});
    const entry={id:Date.now(),type:"consume",items:mergedItems,timestamp:Date.now()};
    const newHist=[entry,...history];
    setInventory(newInv);setHistory(newHist);saveData(newInv,newHist);
    setConsumeError(null);setConsumeText("");
    showToast("消耗已保存");setView("inventory");
  };

  const submitRestock=()=>{
    const {items,errors}=parseTextInput(restockText);
    if(errors.length>0){setRestockError(errors.join("\n"));return;}
    if(items.length===0){setRestockError("请输入至少一行");return;}
    const invalidQty=items.filter(r=>!VALID_RESTOCK_QTY.has(r.qty));
    if(invalidQty.length>0){
      setRestockError(`数量必须为 500/1000/2000/6000:\n${invalidQty.map(r=>`${r.colorId} ${r.qty}`).join("\n")}`);return;
    }
    const newInv={...inventory};
    items.forEach(r=>{newInv[r.colorId]=(newInv[r.colorId]||0)+r.qty;});
    const entry={id:Date.now(),type:"restock",items,timestamp:Date.now()};
    const newHist=[entry,...history];
    setInventory(newInv);setHistory(newHist);saveData(newInv,newHist);
    setRestockError(null);setRestockText("");showToast("补货已入库");
  };

  const undoHistory=(entryId)=>{
    const entry=history.find(h=>h.id===entryId); if(!entry) return;
    const newInv={...inventory};
    entry.items.forEach(item=>{
      if(entry.type==="restock") newInv[item.colorId]=Math.max(0,(newInv[item.colorId]||0)-item.qty);
      else newInv[item.colorId]=(newInv[item.colorId]||0)+item.qty;
    });
    const newHist=history.filter(h=>h.id!==entryId);
    setInventory(newInv);setHistory(newHist);saveData(newInv,newHist);showToast("已撤回");
  };

  const exportData=()=>{
    const data=JSON.stringify({inventory,history,thresholdConfig:tc,exportedAt:new Date().toISOString()},null,2);
    const blob=new Blob([data],{type:"application/json"});
    const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;
    a.download=`perler-inventory-${new Date().toISOString().slice(0,10)}.json`;
    a.click();URL.revokeObjectURL(url);showToast("导出成功");
  };
  const importData=(e)=>{
    const file=e.target.files?.[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=(ev)=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(!data.inventory||typeof data.inventory!=="object"){showToast("文件格式错误","error");return;}
        setInventory(data.inventory);setHistory(data.history||[]);
        if(data.thresholdConfig) saveTc(data.thresholdConfig);
        saveData(data.inventory,data.history||[]);showToast("导入成功");
      }catch{showToast("JSON解析失败","error");}
    };
    reader.readAsText(file);e.target.value="";
  };

  const calcRestockPack=(colorId,stockAfterConsume)=>{
    const threshold=getThreshold(colorId),minPack=getMinPack(colorId);
    if(stockAfterConsume>threshold) return null;
    const needed=threshold-stockAfterConsume+1;
    for(const p of PACK_SIZES){if(p>=needed&&p>=minPack) return p;}
    return PACK_SIZES[PACK_SIZES.length-1];
  };

  const computeRestockList=(extraConsume={})=>{
    const result=[];
    ALL_COLOR_IDS.forEach(cid=>{
      const stock=inventory[cid]||0,consume=extraConsume[cid]||0;
      if(stock===0&&consume===0) return;
      const afterConsume=stock-consume;
      const pack=calcRestockPack(cid,afterConsume);
      if(pack!==null) result.push({colorId:cid,stock,consume,afterConsume,pack,remaining:afterConsume+pack});
    });
    return result;
  };

  const getProjectConsume=()=>{
    if(!projectText.trim()) return {consume:{},errors:[]};
    const {items,errors}=parseTextInput(projectText);
    const consume={};
    items.forEach(r=>{consume[r.colorId]=(consume[r.colorId]||0)+r.qty;});
    return {consume,errors};
  };

  const groupByPack=(list)=>{
    const groups={};
    list.forEach(item=>{if(!groups[item.pack]) groups[item.pack]=[];groups[item.pack].push(item);});
    return groups;
  };

  const makePackText=(items,pack)=>items.map(it=>`${it.colorId} ${pack}`).join("\n");

  const getFilteredColors=()=>{
    const colors=COLOR_DATA[activeGroup]||[];
    if(!searchTerm) return colors;
    return colors.filter(c=>c.id.toLowerCase().includes(searchTerm.toLowerCase()));
  };

  const S={
    header:{background:"linear-gradient(135deg,#1a1b26 0%,#1f2133 100%)",borderBottom:"1px solid rgba(255,255,255,0.06)",padding:"16px 20px 12px",position:"sticky",top:0,zIndex:100},
    title:{fontSize:18,fontWeight:700,letterSpacing:"0.5px",margin:0,background:"linear-gradient(90deg,#ff6b6b,#ffa06b,#ffd06b)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"},
    navRow:{display:"flex",gap:6,marginTop:12,overflowX:"auto",paddingBottom:4},
    navBtn:(a)=>({padding:"6px 14px",borderRadius:20,border:"none",fontSize:13,fontWeight:600,whiteSpace:"nowrap",transition:"all 0.2s",background:a?"rgba(255,255,255,0.15)":"rgba(255,255,255,0.04)",color:a?"#fff":"#888"}),
    viewTabs:{display:"flex",gap:0,margin:"12px 20px 0",background:"rgba(255,255,255,0.04)",borderRadius:12,padding:3},
    viewTab:(a)=>({flex:1,padding:"8px 0",border:"none",borderRadius:10,fontSize:12,fontWeight:600,transition:"all 0.2s",background:a?"rgba(255,255,255,0.12)":"transparent",color:a?"#fff":"#666"}),
    grid:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))",gap:10,padding:"0 20px 100px"},
    card:{background:"rgba(255,255,255,0.04)",borderRadius:14,padding:"14px 12px",display:"flex",flexDirection:"column",alignItems:"center",gap:8,border:"1px solid rgba(255,255,255,0.06)"},
    swatch:(hex)=>({width:44,height:44,borderRadius:"50%",background:hex,border:isLightColor(hex)?"2px solid rgba(0,0,0,0.1)":"2px solid rgba(255,255,255,0.15)",boxShadow:`0 2px 12px ${hex}44`}),
    colorLabel:{fontSize:13,fontWeight:700,letterSpacing:"0.5px",color:"#ccc"},
    stockNum:(val,cid)=>({fontSize:18,fontWeight:800,color:val===0?"#555":val<=getThreshold(cid)?"#ff6b6b":"#7bed9f",fontVariantNumeric:"tabular-nums"}),
    textarea:{width:"100%",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:12,padding:"12px 14px",color:"#fff",fontSize:13,fontFamily:"'SF Mono',Menlo,monospace",outline:"none",resize:"vertical",lineHeight:1.6,minHeight:80},
    panel:{background:"rgba(255,255,255,0.03)",borderRadius:14,border:"1px solid rgba(255,255,255,0.06)",padding:16,marginBottom:14},
    historyItem:{background:"rgba(255,255,255,0.04)",borderRadius:12,padding:"14px 16px",marginBottom:10,border:"1px solid rgba(255,255,255,0.06)"},
    toast:(type)=>({position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",padding:"10px 24px",borderRadius:12,fontSize:14,fontWeight:600,zIndex:9999,background:type==="error"?"#ff4757":"#2ed573",color:"#fff",boxShadow:"0 4px 20px rgba(0,0,0,0.4)",animation:"slideDown 0.3s ease"}),
    btn:(c)=>({padding:"10px 24px",borderRadius:12,border:"none",fontSize:14,fontWeight:700,background:c==="green"?"rgba(46,213,115,0.15)":c==="red"?"rgba(255,71,87,0.15)":c==="blue"?"rgba(116,185,255,0.15)":"rgba(255,255,255,0.08)",color:c==="green"?"#2ed573":c==="red"?"#ff4757":c==="blue"?"#74b9ff":"#aaa"}),
    errBox:{background:"rgba(255,71,87,0.1)",border:"1px solid rgba(255,71,87,0.3)",borderRadius:12,padding:"12px 16px",marginTop:12,color:"#ff6b81",fontSize:12,whiteSpace:"pre-line",lineHeight:1.6},
    hint:{fontSize:11,color:"#555",marginBottom:8,fontFamily:"'SF Mono',Menlo,monospace",lineHeight:1.5},
    copyTextBox:{background:"rgba(255,255,255,0.04)",borderRadius:10,padding:"10px 14px",fontSize:12,fontFamily:"'SF Mono',Menlo,monospace",color:"#bbb",whiteSpace:"pre-line",lineHeight:1.6,marginTop:10},
  };

  const SectionTitle=({children})=><div style={{fontSize:14,fontWeight:700,color:"#aaa",marginBottom:10}}>{children}</div>;

  return (
    <div style={{fontFamily:"-apple-system,'SF Pro Display','Helvetica Neue',sans-serif",background:"#0f1117",color:"#e8e8ed",minHeight:"100vh"}}>
      {toast&&<div style={S.toast(toast.type)}>{toast.msg}</div>}
      <div style={S.header}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <h1 style={S.title}>拼豆库存管理器</h1>
          <div style={{display:"flex",gap:8}}>
            <button onClick={exportData} style={{...S.btn(),padding:"6px 12px",fontSize:12}}>导出</button>
            <button onClick={()=>fileInputRef.current?.click()} style={{...S.btn(),padding:"6px 12px",fontSize:12}}>导入</button>
            <input ref={fileInputRef} type="file" accept=".json" onChange={importData} style={{display:"none"}} />
          </div>
        </div>
        <div style={S.viewTabs}>
          {[["inventory","库存总览"],["consume","消耗记录"],["restockList","补货清单"],["history","操作历史"]].map(([k,l])=>(
            <button key={k} onClick={()=>setView(k)} style={S.viewTab(view===k)}>{l}</button>
          ))}
        </div>
        {view==="inventory"&&(
          <>
            <div style={S.navRow}>
              {GROUPS.map(g=><button key={g} onClick={()=>setActiveGroup(g)} style={S.navBtn(activeGroup===g)}>{GROUP_LABELS[g]}</button>)}
            </div>
            <div style={{marginTop:10}}>
              <input type="text" placeholder="搜索色号..." value={searchTerm} onChange={e=>setSearchTerm(e.target.value)}
                style={{width:"100%",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:10,padding:"8px 14px",color:"#fff",fontSize:13,outline:"none",fontFamily:"inherit"}} />
            </div>
          </>
        )}
      </div>

      {view==="inventory"&&(
        <div style={{padding:"16px 20px 100px"}}>
          <div style={S.panel}>
            <SectionTitle>快速补货</SectionTitle>
            <div style={S.hint}>每行格式：色号 数量（仅限 500/1000/2000/6000）<br/>例：H7 1000</div>
            <textarea style={S.textarea} placeholder={TEXT_EXAMPLE} value={restockText} onChange={e=>setRestockText(e.target.value)} rows={4} />
            {restockError&&<div style={S.errBox}>{restockError}</div>}
            <div style={{marginTop:12}}><button onClick={submitRestock} style={S.btn("green")}>确认补货</button></div>
          </div>
          <div style={S.grid}>
            {getFilteredColors().map(color=>{
              const stock=inventory[color.id]||0;
              return (
                <div key={color.id} style={S.card}>
                  <div style={S.swatch(color.hex)} />
                  <div style={S.colorLabel}>{color.id}</div>
                  <div style={S.stockNum(stock,color.id)}>{stock}</div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {view==="consume"&&(
        <div style={{padding:20,maxWidth:540,margin:"0 auto"}}>
          <SectionTitle>填入消耗的色号和数量</SectionTitle>
          <div style={S.hint}>每行格式：色号 数量<br/>例：A1 200</div>
          <textarea style={S.textarea} placeholder={TEXT_EXAMPLE} value={consumeText} onChange={e=>setConsumeText(e.target.value)} rows={8} />
          {consumeError&&<div style={S.errBox}>{consumeError}</div>}
          <div style={{marginTop:14}}><button onClick={submitConsume} style={S.btn("green")}>保存消耗</button></div>
        </div>
      )}

      {view==="restockList"&&(()=>{
        const {consume:projConsume,errors}=getProjectConsume();
        const hasProject=Object.keys(projConsume).length>0;
        const restockItems=computeRestockList(projConsume);
        const grouped=groupByPack(restockItems);
        const sortedPacks=Object.keys(grouped).map(Number).sort((a,b)=>a-b);
        const mergedDisplay=tcMergedDisplay(tc);

        const openSettings=()=>{
          setEditNormal({threshold:tc.normal.threshold,minPack:tc.normal.minPack});
          setEditSpecial([]);
          setShowSettings(true);
        };
        const saveSettings=()=>{
          const newTc=JSON.parse(JSON.stringify(tc));
          if(editNormal){
            const t=parseInt(editNormal.threshold,10);
            const m=parseInt(editNormal.minPack,10);
            if(!isNaN(t)&&t>0) newTc.normal.threshold=t;
            if(PACK_SIZES.includes(m)) newTc.normal.minPack=m;
          }
          // Append new special groups
          editSpecial.forEach(g=>{
            const ids=g.ids.trim().split(/\s+/).map(s=>s.toUpperCase()).filter(s=>COLOR_MAP[s]);
            const t=parseInt(g.threshold,10);
            const m=parseInt(g.minPack,10);
            if(ids.length>0) newTc.special.push({
              ids,
              threshold:(!isNaN(t)&&t>0)?t:newTc.normal.threshold,
              minPack:PACK_SIZES.includes(m)?m:newTc.normal.minPack
            });
          });
          saveTc(newTc);
          setEditNormal({threshold:newTc.normal.threshold,minPack:newTc.normal.minPack});
          setEditSpecial([]);
          showToast("阈值已保存");
        };
        const deleteSpecialGroup=(groupIndex)=>{
          const newTc=JSON.parse(JSON.stringify(tc));
          newTc.special.splice(groupIndex,1);
          saveTc(newTc);showToast("已删除");
        };

        const packSelect=(val,onChange)=>(
          <select value={val} onChange={e=>onChange(parseInt(e.target.value,10))}
            style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,padding:"6px 10px",color:"#fff",fontSize:12,outline:"none"}}>
            {PACK_SIZES.map(p=><option key={p} value={p}>{p}</option>)}
          </select>
        );

        return (
          <div style={{padding:"16px 20px 100px"}}>
            {/* Settings toggle */}
            <div style={{display:"flex",justifyContent:"flex-end",marginBottom:10}}>
              <button onClick={showSettings?()=>setShowSettings(false):openSettings}
                style={{...S.btn(),padding:"6px 14px",fontSize:12}}>{showSettings?"关闭设置":"阈值设置"}</button>
            </div>

            {/* Settings Panel */}
            {showSettings&&(
              <>
              <div style={S.panel}>
                <SectionTitle>当前阈值</SectionTitle>
                <div style={{padding:"10px 14px",background:"rgba(255,255,255,0.03)",borderRadius:10,fontSize:12,lineHeight:2,color:"#999"}}>
                  <div><span style={{color:"#7bed9f"}}>普通</span> ｜库存报警 {tc.normal.threshold} ｜补货规格起步 {tc.normal.minPack}</div>
                  {tc.special.map((g,i)=>(
                    <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <span><span style={{color:"#ffa502"}}>特殊</span> ｜库存报警 {g.threshold} ｜补货规格起步 {g.minPack} ｜<span style={{color:"#ccc"}}>{g.ids.join(" ")}</span></span>
                      <button onClick={()=>deleteSpecialGroup(i)}
                        style={{background:"none",border:"none",color:"#ff4757",fontSize:12,cursor:"pointer",padding:"0 4px",flexShrink:0}}>删除</button>
                    </div>
                  ))}
                </div>
              </div>
              <div style={S.panel}>
                <SectionTitle>自定义阈值</SectionTitle>
                <div style={{fontSize:12,color:"#888",marginBottom:6}}>常规组</div>
                <div style={{display:"flex",gap:10,marginBottom:14,alignItems:"center",flexWrap:"wrap"}}>
                  <span style={{fontSize:11,color:"#666"}}>库存报警</span>
                  <input type="number" value={editNormal?.threshold||""} onChange={e=>setEditNormal({...editNormal,threshold:e.target.value})}
                    style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,padding:"6px 10px",color:"#fff",fontSize:12,width:70,outline:"none"}} />
                  <span style={{fontSize:11,color:"#666"}}>补货规格起步</span>
                  {packSelect(editNormal?.minPack||500,v=>setEditNormal({...editNormal,minPack:v}))}
                </div>
                {editSpecial&&editSpecial.map((g,i)=>(
                  <div key={i} style={{marginBottom:10}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                      <span style={{fontSize:12,color:"#888"}}>新增特殊组 {i+1}</span>
                      <button onClick={()=>setEditSpecial(editSpecial.filter((_,j)=>j!==i))}
                        style={{background:"none",border:"none",color:"#ff4757",fontSize:14,padding:"0 4px",cursor:"pointer"}}>删除</button>
                    </div>
                    <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
                      <input type="text" placeholder="色号 空格分隔" value={g.ids}
                        onChange={e=>{const n=[...editSpecial];n[i]={...n[i],ids:e.target.value};setEditSpecial(n);}}
                        style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,padding:"6px 10px",color:"#fff",fontSize:12,flex:1,minWidth:120,outline:"none"}} />
                      <span style={{fontSize:11,color:"#666"}}>库存报警</span>
                      <input type="number" value={g.threshold}
                        onChange={e=>{const n=[...editSpecial];n[i]={...n[i],threshold:e.target.value};setEditSpecial(n);}}
                        style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,padding:"6px 10px",color:"#fff",fontSize:12,width:70,outline:"none"}} />
                      <span style={{fontSize:11,color:"#666"}}>补货规格起步</span>
                      {packSelect(g.minPack,v=>{const n=[...editSpecial];n[i]={...n[i],minPack:v};setEditSpecial(n);})}
                    </div>
                  </div>
                ))}
                <button onClick={()=>setEditSpecial([...(editSpecial||[]),{ids:"",threshold:200,minPack:500}])}
                  style={{width:"100%",padding:8,borderRadius:10,border:"1px dashed rgba(255,255,255,0.12)",background:"transparent",color:"#555",fontSize:16,cursor:"pointer",marginBottom:12}}>+ 添加特殊组</button>
                <button onClick={saveSettings} style={S.btn("green")}>保存阈值</button>
              </div>
              </>
            )}

            {!showSettings&&(<>
            <div style={S.panel}>
              <SectionTitle>新作品用量（可选）</SectionTitle>
              <div style={S.hint}>每行格式：色号 数量<br/>例：A1 200</div>
              <textarea style={S.textarea} placeholder={TEXT_EXAMPLE} value={projectText} onChange={e=>setProjectText(e.target.value)} rows={5} />
              {errors.length>0&&<div style={S.errBox}>{errors.join("\n")}</div>}
            </div>
            {restockItems.length===0?(
              <div style={{textAlign:"center",color:"#555",marginTop:40,fontSize:14}}>
                {hasProject?"所有颜色库存充足，无需补货":"当前无标红色号，无需补货"}
              </div>
            ):(
              <>
                {hasProject&&(
                  <div style={{fontSize:12,color:"#888",marginBottom:14,padding:"8px 12px",background:"rgba(255,165,2,0.06)",borderRadius:10,lineHeight:1.6}}>
                    已合并：当前标红色号 + 新作品消耗后会标红的色号
                  </div>
                )}
                {sortedPacks.map(pack=>{
                  const items=grouped[pack];
                  const packText=makePackText(items,pack);
                  return (
                    <div key={pack} style={S.panel}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                        <span style={{fontSize:15,fontWeight:800,color:pack===500?"#7bed9f":pack===1000?"#ffa502":pack===2000?"#ff6b6b":"#a55eea"}}>{pack}粒/包</span>
                        <div style={{display:"flex",gap:8,alignItems:"center"}}>
                          <span style={{fontSize:12,fontWeight:700,color:"#888",background:"rgba(255,255,255,0.06)",padding:"3px 10px",borderRadius:8}}>共 {items.length} 包</span>
                          <button onClick={()=>copyToClipboard(packText)} style={{...S.btn("blue"),padding:"4px 12px",fontSize:11}}>复制</button>
                        </div>
                      </div>
                      <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                        {items.map(item=>(
                          <div key={item.colorId} style={{display:"flex",alignItems:"center",gap:6,background:"rgba(255,255,255,0.04)",borderRadius:8,padding:"5px 10px"}}>
                            <div style={{width:18,height:18,borderRadius:"50%",background:COLOR_MAP[item.colorId]?.hex||"#333",border:isLightColor(COLOR_MAP[item.colorId]?.hex||"#333")?"1px solid rgba(0,0,0,0.1)":"1px solid rgba(255,255,255,0.15)"}} />
                            <span style={{fontSize:12,fontWeight:700,color:"#ccc"}}>{item.colorId}</span>
                            {hasProject&&<span style={{fontSize:10,color:"#7bed9f"}}>余{item.remaining}</span>}
                          </div>
                        ))}
                      </div>
                      <div style={S.copyTextBox}>{packText}</div>
                    </div>
                  );
                })}
                <div style={{background:"rgba(255,255,255,0.06)",borderRadius:12,padding:"14px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontSize:13,fontWeight:600,color:"#aaa"}}>补货总计</span>
                  <div style={{display:"flex",gap:14}}>
                    {sortedPacks.map(pack=><span key={pack} style={{fontSize:13,fontWeight:700,color:"#ddd"}}>{pack}粒×{grouped[pack].length}</span>)}
                  </div>
                </div>
              </>
            )}
            </>)}
          </div>
        );
      })()}

      {view==="history"&&(
        <div style={{padding:"16px 20px 100px"}}>
          {history.length===0?(
            <div style={{textAlign:"center",color:"#555",marginTop:60,fontSize:14}}>暂无操作记录</div>
          ):history.map(entry=>(
            <div key={entry.id} style={S.historyItem}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                <div>
                  <span style={{display:"inline-block",padding:"2px 10px",borderRadius:6,fontSize:11,fontWeight:700,background:entry.type==="restock"?"rgba(46,213,115,0.12)":"rgba(255,165,2,0.12)",color:entry.type==="restock"?"#2ed573":"#ffa502",marginRight:8}}>
                    {entry.type==="restock"?"补货":"消耗"}
                  </span>
                  <span style={{fontSize:12,color:"#666"}}>{formatTime(entry.timestamp)}</span>
                </div>
                <button onClick={()=>undoHistory(entry.id)} style={{...S.btn("red"),padding:"4px 12px",fontSize:12}}>撤回</button>
              </div>
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                {entry.items.map((item,i)=>(
                  <div key={i} style={{display:"flex",alignItems:"center",gap:6,background:"rgba(255,255,255,0.04)",borderRadius:8,padding:"4px 10px"}}>
                    <div style={{width:16,height:16,borderRadius:"50%",background:COLOR_MAP[item.colorId]?.hex||"#333",border:"1px solid rgba(255,255,255,0.1)"}} />
                    <span style={{fontSize:12,fontWeight:600,color:"#bbb"}}>{item.colorId}</span>
                    <span style={{fontSize:12,fontWeight:700,color:entry.type==="restock"?"#7bed9f":"#ffa502"}}>
                      {entry.type==="restock"?"+":"-"}{item.qty}
                    </span>
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
